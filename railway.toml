# ══════════════════════════════════════════════════════════════════
#  railway.toml — Railway.app deployment configuration
#  Docs: https://docs.railway.app/reference/config-as-code
# ══════════════════════════════════════════════════════════════════

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Cron job: 2x per day, uploads immediately after generation
# 07:00 UTC = 10:00 Bucharest (morning)
# 16:00 UTC = 19:00 Bucharest (evening)
cronSchedule = "0 7,16 * * *"
startCommand = "python main.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
