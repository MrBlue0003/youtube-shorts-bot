# ══════════════════════════════════════════════════════════════════
#  railway.toml — Railway.app deployment configuration
#  Docs: https://docs.railway.app/reference/config-as-code
# ══════════════════════════════════════════════════════════════════

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Cron job: 3x per day, uploads immediately after generation
# 07:00 UTC = 10:00 Bucharest (morning)
# 13:00 UTC = 16:00 Bucharest (afternoon)
# 18:00 UTC = 21:00 Bucharest (evening)
cronSchedule = "0 7,13,18 * * *"
startCommand = "python main.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
