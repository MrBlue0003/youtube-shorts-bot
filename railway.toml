# ══════════════════════════════════════════════════════════════════
#  railway.toml — Railway.app deployment configuration
#  Docs: https://docs.railway.app/reference/config-as-code
# ══════════════════════════════════════════════════════════════════

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Cron job: 1x per day, uploads immediately after generation
# 07:00 UTC = 10:00 Bucharest
cronSchedule = "0 7 * * *"
startCommand = "python main.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
