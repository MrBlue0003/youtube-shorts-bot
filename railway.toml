# ══════════════════════════════════════════════════════════════════
#  railway.toml — Railway.app deployment configuration
#  Docs: https://docs.railway.app/reference/config-as-code
# ══════════════════════════════════════════════════════════════════

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Cron job: run main.py every day at 15:00 UTC
# (= 18:00 Bucharest EEST / 17:00 EET — bot waits internally for 18:30)
cronSchedule = "0 15 * * *"
startCommand = "python main.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
