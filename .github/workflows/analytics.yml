name: CuteDaily Weekly Analytics

on:
  schedule:
    # Every Sunday at 07:00 UTC — after a full week of posts
    - cron: '0 7 * * 0'
  workflow_dispatch: {}

jobs:
  analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run analytics & update weights
        env:
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CHANNEL_ID:    ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: python scripts/analytics.py

      - name: Commit updated weights
        run: |
          git config user.email "cutedaily-bot@github.com"
          git config user.name "CuteDaily Bot"
          git add data/weights.json
          git diff --staged --quiet || git commit -m "chore: update animal weights [skip ci]"
          git pull --rebase
          git push
