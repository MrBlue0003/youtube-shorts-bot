name: CuteDaily Health Check

on:
  schedule:
    # Runs every day at 22:00 UTC — checks if at least 1 post happened today
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Check last upload
        run: |
          python3 - <<'EOF'
          import json, sys
          from datetime import datetime, timezone

          try:
              with open("logs/uploaded.json") as f:
                  data = json.load(f)
              uploads = [u for u in data.get("uploads", []) if "video_id" in u]
              if not uploads:
                  print("NO_UPLOADS")
                  sys.exit(1)
              last = uploads[-1]
              ts = last["timestamp"]
              last_dt = datetime.fromisoformat(ts.replace("Z", "+00:00"))
              age_hours = (datetime.now(timezone.utc) - last_dt).total_seconds() / 3600
              print(f"Last upload: {last.get('title','?')} — {age_hours:.1f}h ago")
              if age_hours > 30:
                  print(f"WARNING: No post in {age_hours:.1f} hours!")
                  sys.exit(1)
              print("OK: bot is healthy")
          except Exception as e:
              print(f"ERROR: {e}")
              sys.exit(1)
          EOF

      - name: Auto-trigger if unhealthy
        if: failure()
        run: |
          echo "Health check failed — auto-triggering daily_post workflow"
          curl -s -o /dev/null -w "Trigger status: %{http_code}\n" -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/daily_post.yml/dispatches" \
            -d '{"ref":"main"}'
